<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Already Applied')}"></head>
<body>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div style="min-height:70vh;display:flex;align-items:center;justify-content:center;padding:40px 16px">
    <div class="text-center" style="max-width:480px">
        <div style="width:88px;height:88px;background:#E8F6EC;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 24px">
            <i class="bi bi-patch-check-fill" style="font-size:2.2rem;color:#0BA02C"></i>
        </div>
        <h2 class="fw-800 mb-2" style="color:var(--text-dark);font-family:'Manrope',sans-serif">Already Applied</h2>
        <p class="text-muted mb-5" th:text="${errorMessage ?: 'You have already submitted an application for this job.'}">Error</p>
        <div class="d-flex gap-3 justify-content-center flex-wrap">
            <a th:href="@{/student/my-applications}" class="btn-apply text-white text-decoration-none px-4 py-2">
                <i class="bi bi-clipboard-check me-1"></i>My Applications
            </a>
            <a th:href="@{/student/jobs}" class="btn btn-outline-secondary rounded-12 px-4">
                <i class="bi bi-search me-1"></i>Browse More Jobs
            </a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
