<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Job Not Found')}"></head>
<body>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div style="min-height:70vh;display:flex;align-items:center;justify-content:center;padding:40px 16px">
    <div class="text-center" style="max-width:480px">
        <div style="width:88px;height:88px;background:#FFF4E5;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 24px">
            <i class="bi bi-briefcase-x" style="font-size:2.2rem;color:#F58220"></i>
        </div>
        <div class="fw-800 mb-1" style="font-size:4rem;color:var(--border);font-family:'Manrope',sans-serif;line-height:1">404</div>
        <h2 class="fw-800 mb-2" style="color:var(--text-dark);font-family:'Manrope',sans-serif">Job Not Found</h2>
        <p class="text-muted mb-5" th:text="${errorMessage ?: 'This job posting no longer exists or has been removed.'}">Error</p>
        <div class="d-flex gap-3 justify-content-center flex-wrap">
            <a th:href="@{/student/jobs}" class="btn-apply text-white text-decoration-none px-4 py-2">
                <i class="bi bi-search me-1"></i>Browse All Jobs
            </a>
            <a th:href="@{/}" class="btn btn-outline-secondary rounded-12 px-4">
                <i class="bi bi-house me-1"></i>Home
            </a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
