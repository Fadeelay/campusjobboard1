<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<nav th:fragment="navbar" class="site-navbar navbar navbar-expand-lg sticky-top">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">
            <i class="bi bi-rocket-takeoff-fill me-1"></i>StudentHustle
        </a>
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav mx-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/}">Home</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('STUDENT')">
                    <a class="nav-link" th:href="@{/student/jobs}">Find Jobs</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('STUDENT')">
                    <a class="nav-link" th:href="@{/student/my-applications}">My Applications</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('EMPLOYER')">
                    <a class="nav-link" th:href="@{/employer/dashboard}">Dashboard</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('EMPLOYER')">
                    <a class="nav-link" th:href="@{/employer/post-job}">Post a Job</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/admin/dashboard}">Dashboard</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/admin/jobs}">Jobs</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/admin/users}">Users</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/admin/logs}">Logs</a>
                </li>
            </ul>
            <div class="d-flex align-items-center gap-2">
                <!-- Anonymous: Login + Register buttons -->
                <div class="d-flex gap-2" sec:authorize="isAnonymous()">
                    <a th:href="@{/login}"    class="btn-nav-login px-3 py-2">Login</a>
                    <a th:href="@{/register}" class="btn-nav-post  px-3 py-2">Register</a>
                </div>
                <!-- Authenticated: avatar dropdown -->
                <div sec:authorize="isAuthenticated()">
                    <div class="dropdown">
                        <button class="btn d-flex align-items-center gap-2 p-1 border-0 bg-transparent" data-bs-toggle="dropdown">
                            <div class="user-avatar">
                                <span th:text="${#strings.substring(#authentication.name, 0, 1).toUpperCase()}">U</span>
                            </div>
                            <span class="fw-600 small text-dark d-none d-lg-block" sec:authentication="name">User</span>
                            <i class="bi bi-chevron-down small text-muted"></i>
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end shadow border-0 rounded-12 mt-2" style="min-width:180px">
                            <li class="px-3 py-2 border-bottom">
                                <small class="text-muted">Signed in as</small>
                                <div class="fw-600 small text-dark" sec:authentication="name">user</div>
                            </li>
                            <li><a class="dropdown-item py-2" th:href="@{/swagger-ui/index.html}">
                                <i class="bi bi-code-slash me-2 text-muted"></i>API Docs
                            </a></li>
                            <li><hr class="dropdown-divider my-1"></li>
                            <li><a class="dropdown-item py-2 text-danger" th:href="@{/logout}">
                                <i class="bi bi-box-arrow-right me-2"></i>Logout
                            </a></li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>
</nav>
</body>
</html>
