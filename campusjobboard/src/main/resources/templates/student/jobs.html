<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Find Jobs')}"></head>
<body>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<!-- Page Header -->
<div class="page-header">
    <div class="container">
        <h1><i class="bi bi-search me-2"></i>Find Your Next Role</h1>
        <p>Browse approved openings from verified campus employers</p>
    </div>
</div>

<div class="container py-5">
    <div class="row g-4">

        <!-- ── Filter Sidebar ── -->
        <div class="col-lg-3" data-aos="fade-right">
            <div class="filter-card">
                <form method="get" th:action="@{/student/jobs}">
                    <h6>Location</h6>
                    <input type="text" name="location" class="form-control mb-3"
                           placeholder="e.g. New York, Remote" th:value="${location}">

                    <h6>Category</h6>
                    <select name="category" class="form-select mb-3">
                        <option value="">All Categories</option>
                        <option th:each="cat : ${ {'Engineering','Design','Marketing','Finance','Research','Operations','Sales','Other'} }"
                                th:value="${cat}" th:text="${cat}"
                                th:selected="${cat == category}">Cat</option>
                    </select>

                    <h6>Minimum Salary ($/hr)</h6>
                    <input type="number" name="minSalary" class="form-control mb-3"
                           placeholder="e.g. 15" th:value="${minSalary}" min="0">

                    <h6>Maximum Salary ($/hr)</h6>
                    <input type="number" name="maxSalary" class="form-control mb-3"
                           placeholder="Any" th:value="${maxSalary}" min="0">

                    <button type="submit" class="btn-filter">
                        <i class="bi bi-funnel me-1"></i>Apply Filters
                    </button>
                    <a th:href="@{/student/jobs}" class="btn-clear d-block text-center text-decoration-none mt-2">
                        Clear All
                    </a>
                </form>
            </div>
        </div>

        <!-- ── Results ── -->
        <div class="col-lg-9">
            <!-- Active filters banner -->
            <div th:if="${location != null or category != null or minSalary != null or maxSalary != null}"
                 class="alert alert-info d-flex align-items-center gap-2 mb-3 py-2">
                <i class="bi bi-funnel-fill"></i>
                <span class="small">Filters active —
                    <span th:if="${location}"   th:text="'Location: ' + ${location} + '  '"></span>
                    <span th:if="${category}"   th:text="'Category: ' + ${category} + '  '"></span>
                    <span th:if="${minSalary}"  th:text="'Min $' + ${minSalary} + '/hr  '"></span>
                    <span th:if="${maxSalary}"  th:text="'Max $' + ${maxSalary} + '/hr'"></span>
                </span>
                <a th:href="@{/student/jobs}" class="ms-auto small fw-600" style="color:var(--primary)">Clear</a>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-3">
                <span class="text-muted small fw-500"
                      th:text="${#lists.size(jobs)} + ' job(s) found'"></span>
            </div>

            <!-- Empty state -->
            <div th:if="${#lists.isEmpty(jobs)}" class="text-center py-5" style="background:#fff;border-radius:12px;border:1px solid var(--border)">
                <div style="width:72px;height:72px;background:#E8F1FF;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px">
                    <i class="bi bi-inbox" style="font-size:1.8rem;color:#1967D2"></i>
                </div>
                <h5 style="color:var(--text-dark)">No jobs match your search</h5>
                <p class="text-muted small">Try broadening your filters or check back later.</p>
                <a th:href="@{/student/jobs}" class="btn btn-primary rounded-12 px-4">View All Jobs</a>
            </div>

            <!-- Job cards -->
            <div class="row g-3" th:unless="${#lists.isEmpty(jobs)}">
                <div class="col-12" th:each="job : ${jobs}" data-aos="fade-up">
                    <div class="job-card d-flex gap-3 align-items-start">
                        <div class="company-logo flex-shrink-0"
                             th:text="${#strings.substring(job.employer.fullName,0,1).toUpperCase()}">E</div>
                        <div class="flex-grow-1">
                            <div class="d-flex justify-content-between align-items-start flex-wrap gap-2">
                                <div>
                                    <h5 class="mb-1">
                                        <a th:href="@{/student/jobs/{id}(id=${job.jobId})}"
                                           th:text="${job.title}">Title</a>
                                    </h5>
                                    <span class="job-company" th:text="${job.employer.fullName}">Company</span>
                                </div>
                                <span class="salary-badge" th:if="${job.salary}">
                                    $<span th:text="${#numbers.formatDecimal(job.salary,1,0)}">0</span>/hr
                                </span>
                            </div>
                            <div class="job-meta mt-2">
                                <span th:if="${job.location}"><i class="bi bi-geo-alt-fill" style="color:#1967D2"></i><span th:text="${job.location}"></span></span>
                                <span th:if="${job.category}"><i class="bi bi-tag-fill" style="color:#0BA02C"></i><span th:text="${job.category}"></span></span>
                                <span th:if="${job.deadline}"><i class="bi bi-calendar3" style="color:#F58220"></i>Due <span th:text="${job.deadline}"></span></span>
                            </div>
                        </div>
                        <div class="flex-shrink-0 d-flex flex-column align-items-end gap-2">
                            <a th:href="@{/student/jobs/{id}(id=${job.jobId})}"
                               class="btn-apply text-white text-decoration-none">Apply Now</a>
                            <small class="text-muted" th:if="${job.createdAt}"
                                   th:text="${#temporals.format(job.createdAt,'MMM d')}"></small>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
