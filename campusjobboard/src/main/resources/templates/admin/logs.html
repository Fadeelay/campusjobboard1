<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Application Logs')}"></head>
<body>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="page-header">
    <div class="container d-flex justify-content-between align-items-center flex-wrap gap-3">
        <div>
            <h1><i class="bi bi-journal-text me-2"></i>Application Logs</h1>
            <p class="mb-0"
               th:text="${#lists.size(logs)} + ' entries (last 200) — refreshes on page load'"></p>
        </div>
        <div class="d-flex gap-2">
            <button onclick="window.location.reload()" class="btn btn-outline-light rounded-12 btn-sm px-3">
                <i class="bi bi-arrow-clockwise me-1"></i>Refresh
            </button>
            <a th:href="@{/admin/dashboard}" class="btn btn-outline-light rounded-12 btn-sm px-3">
                <i class="bi bi-arrow-left me-1"></i>Dashboard
            </a>
        </div>
    </div>
</div>

<div class="container-fluid py-5 px-4">

    <!-- Level filter -->
    <div class="mb-4 d-flex gap-2 flex-wrap align-items-center">
        <span class="text-muted small me-1">Filter:</span>
        <button class="btn btn-sm rounded-20 active" id="btn-ALL"   onclick="filterLevel('ALL')"
                style="background:var(--dark);color:#fff;border:none;padding:4px 14px;border-radius:20px">All</button>
        <button class="btn btn-sm rounded-20" id="btn-ERROR" onclick="filterLevel('ERROR')"
                style="background:#FFEAEA;color:#E05151;border:none;padding:4px 14px;border-radius:20px">ERROR</button>
        <button class="btn btn-sm rounded-20" id="btn-WARN"  onclick="filterLevel('WARN')"
                style="background:#FFF4E5;color:#C96A00;border:none;padding:4px 14px;border-radius:20px">WARN</button>
        <button class="btn btn-sm rounded-20" id="btn-INFO"  onclick="filterLevel('INFO')"
                style="background:#E8F1FF;color:#1967D2;border:none;padding:4px 14px;border-radius:20px">INFO</button>
    </div>

    <!-- Empty state -->
    <div th:if="${#lists.isEmpty(logs)}"
         class="text-center py-5"
         style="background:#fff;border-radius:16px;border:1px solid var(--border)">
        <div style="width:64px;height:64px;background:#E8F1FF;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px">
            <i class="bi bi-journal" style="font-size:1.6rem;color:var(--primary)"></i>
        </div>
        <h5 style="color:var(--text-dark)">No log entries yet</h5>
        <p class="text-muted small">Activity will appear here as users interact with the application.</p>
    </div>

    <!-- Log table -->
    <div th:unless="${#lists.isEmpty(logs)}" class="data-table" data-aos="fade-up">
        <div class="table-responsive">
            <table class="table table-sm align-middle mb-0 font-monospace" id="logTable"
                   style="font-size:.78rem">
                <thead>
                    <tr>
                        <th style="width:170px">Timestamp</th>
                        <th style="width:80px">Level</th>
                        <th style="width:180px">Logger</th>
                        <th>Message</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="entry : ${logs}"
                        th:attr="data-level=${entry.level()}">
                        <td class="text-muted" th:text="${entry.timestamp()}">time</td>
                        <td>
                            <span th:switch="${entry.level()}">
                                <span th:case="'ERROR'" class="badge-type badge-rejected" style="font-size:.7rem">ERROR</span>
                                <span th:case="'WARN'"  class="badge-type badge-interview" style="font-size:.7rem;background:#FFF4E5;color:#C96A00">WARN</span>
                                <span th:case="*"       class="badge-type badge-fulltime"  style="font-size:.7rem" th:text="${entry.level()}">INFO</span>
                            </span>
                        </td>
                        <td class="text-muted" style="font-size:.72rem" th:text="${entry.logger()}">Logger</td>
                        <td style="word-break:break-all" th:text="${entry.message()}">Message</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
const ACTIVE_STYLE = {bg:'var(--primary)',color:'#fff'};
function filterLevel(level) {
    document.querySelectorAll('#logTable tbody tr').forEach(row => {
        row.style.display = (level === 'ALL' || row.dataset.level === level) ? '' : 'none';
    });
    ['ALL','ERROR','WARN','INFO'].forEach(l => {
        const b = document.getElementById('btn-' + l);
        if (!b) return;
        b.style.opacity = (l === level) ? '1' : '.6';
        b.style.fontWeight = (l === level) ? '700' : '400';
    });
}
</script>
</body>
</html>
