<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Admin Dashboard')}"></head>
<body>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="page-header">
    <div class="container">
        <h1><i class="bi bi-shield-check me-2"></i>Admin Dashboard</h1>
        <p>Platform overview and management tools</p>
    </div>
</div>

<div class="container py-5">

    <!-- Stats row -->
    <div class="row g-3 mb-5">
        <div class="col-6 col-lg-3" data-aos="fade-up" data-aos-delay="0">
            <div class="stat-card text-center">
                <div class="number" th:text="${totalJobs}">0</div>
                <div class="label">Total Jobs</div>
                <div class="mt-2">
                    <i class="bi bi-briefcase" style="font-size:1.4rem;color:var(--primary)"></i>
                </div>
            </div>
        </div>
        <div class="col-6 col-lg-3" data-aos="fade-up" data-aos-delay="100">
            <div class="stat-card text-center" style="border-top-color:#F58220">
                <div class="number" style="color:#F58220" th:text="${pendingJobs}">0</div>
                <div class="label">Pending Review</div>
                <div class="mt-2">
                    <i class="bi bi-hourglass-split" style="font-size:1.4rem;color:#F58220"></i>
                </div>
            </div>
        </div>
        <div class="col-6 col-lg-3" data-aos="fade-up" data-aos-delay="200">
            <div class="stat-card text-center" style="border-top-color:#0BA02C">
                <div class="number" style="color:#0BA02C" th:text="${totalUsers}">0</div>
                <div class="label">Registered Users</div>
                <div class="mt-2">
                    <i class="bi bi-people" style="font-size:1.4rem;color:#0BA02C"></i>
                </div>
            </div>
        </div>
        <div class="col-6 col-lg-3" data-aos="fade-up" data-aos-delay="300">
            <div class="stat-card text-center" style="border-top-color:#7B61FF">
                <div class="number" style="color:#7B61FF">Live</div>
                <div class="label">System Status</div>
                <div class="mt-2">
                    <i class="bi bi-activity" style="font-size:1.4rem;color:#7B61FF"></i>
                </div>
            </div>
        </div>
    </div>

    <!-- Quick-action cards -->
    <h5 class="fw-700 mb-3" style="color:var(--text-dark)" data-aos="fade-up">Management Tools</h5>
    <div class="row g-3">
        <div class="col-md-4" data-aos="fade-up" data-aos-delay="0">
            <a th:href="@{/admin/jobs}" class="job-card d-flex align-items-center gap-3 text-decoration-none p-4 h-100">
                <div style="width:52px;height:52px;background:#E8F1FF;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0">
                    <i class="bi bi-briefcase-fill" style="font-size:1.4rem;color:var(--primary)"></i>
                </div>
                <div>
                    <h5 class="mb-1" style="color:var(--text-dark)">Manage Jobs</h5>
                    <p class="text-muted small mb-0">Approve or reject employer postings</p>
                    <span class="badge-type badge-interview mt-2 d-inline-block"
                          th:text="${pendingJobs} + ' pending'"></span>
                </div>
            </a>
        </div>
        <div class="col-md-4" data-aos="fade-up" data-aos-delay="100">
            <a th:href="@{/admin/users}" class="job-card d-flex align-items-center gap-3 text-decoration-none p-4 h-100">
                <div style="width:52px;height:52px;background:#E8F6EC;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0">
                    <i class="bi bi-people-fill" style="font-size:1.4rem;color:#0BA02C"></i>
                </div>
                <div>
                    <h5 class="mb-1" style="color:var(--text-dark)">Manage Users</h5>
                    <p class="text-muted small mb-0">Activate or deactivate accounts</p>
                    <span class="badge-type badge-hired mt-2 d-inline-block"
                          th:text="${totalUsers} + ' total'"></span>
                </div>
            </a>
        </div>
        <div class="col-md-4" data-aos="fade-up" data-aos-delay="200">
            <a th:href="@{/admin/logs}" class="job-card d-flex align-items-center gap-3 text-decoration-none p-4 h-100">
                <div style="width:52px;height:52px;background:#FFEAEA;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0">
                    <i class="bi bi-journal-text" style="font-size:1.4rem;color:#E05151"></i>
                </div>
                <div>
                    <h5 class="mb-1" style="color:var(--text-dark)">Application Logs</h5>
                    <p class="text-muted small mb-0">View recent server log entries</p>
                    <span class="badge-type badge-rejected mt-2 d-inline-block">Real-time</span>
                </div>
            </a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
