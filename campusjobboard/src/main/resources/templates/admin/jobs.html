<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Manage Jobs')}"></head>
<body>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="page-header">
    <div class="container d-flex justify-content-between align-items-center flex-wrap gap-3">
        <div>
            <h1><i class="bi bi-briefcase me-2"></i>Manage Jobs</h1>
            <p class="mb-0">Approve or reject employer job postings</p>
        </div>
        <a th:href="@{/admin/dashboard}" class="btn btn-outline-light rounded-12 btn-sm px-3">
            <i class="bi bi-arrow-left me-1"></i>Dashboard
        </a>
    </div>
</div>

<div class="container py-5">
    <div th:if="${success}" class="alert alert-success mb-4">
        <i class="bi bi-check-circle me-2"></i><span th:text="${success}"></span>
    </div>

    <!-- ── Filter & sort bar ─────────────────────────────────────── -->
    <div class="d-flex flex-wrap gap-3 align-items-center justify-content-between mb-4">

        <!-- Status filter chips -->
        <div class="d-flex gap-2 flex-wrap align-items-center">
            <span class="text-muted small me-1">Filter:</span>
            <button id="fb-ALL"      onclick="filterJobs('ALL')"
                    class="filter-chip active"
                    style="background:var(--primary);color:#fff">All</button>
            <button id="fb-PENDING"  onclick="filterJobs('PENDING')"
                    class="filter-chip"
                    style="background:#FFF4E5;color:#C96A00">Pending</button>
            <button id="fb-APPROVED" onclick="filterJobs('APPROVED')"
                    class="filter-chip"
                    style="background:#E8F6EC;color:#0BA02C">Approved</button>
            <button id="fb-REJECTED" onclick="filterJobs('REJECTED')"
                    class="filter-chip"
                    style="background:#FFEAEA;color:#E05151">Rejected</button>
        </div>

        <!-- Sort + count -->
        <div class="d-flex align-items-center gap-3">
            <span class="small text-muted">
                Showing <strong id="jobCount" th:text="${#lists.size(jobs)}">0</strong> jobs
            </span>
            <div class="d-flex align-items-center gap-2">
                <label class="small text-muted mb-0" for="sortSelect">Sort:</label>
                <select id="sortSelect" onchange="applyFilterSort()"
                        class="form-select form-select-sm rounded-8"
                        style="width:auto;font-size:.82rem;min-width:140px">
                    <option value="date-desc">Newest First</option>
                    <option value="date-asc">Oldest First</option>
                    <option value="alpha-asc">A &#x2192; Z</option>
                    <option value="alpha-desc">Z &#x2192; A</option>
                </select>
            </div>
        </div>
    </div>

    <!-- ── Jobs table ────────────────────────────────────────────── -->
    <div class="data-table" data-aos="fade-up">
        <div class="table-responsive">
            <table class="table align-middle mb-0">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Job Title</th>
                        <th>Employer</th>
                        <th>Category</th>
                        <th>Location</th>
                        <th>Posted</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="jobsTbody">
                    <tr class="job-row"
                        th:each="job : ${jobs}"
                        th:attr="data-status=${job.status?.name()},
                                 data-title=${job.title},
                                 data-created=${job.createdAt != null ? #temporals.format(job.createdAt,'yyyy-MM-dd HH:mm:ss') : ''}">
                        <td class="text-muted small" th:text="${job.jobId}">1</td>
                        <td>
                            <div class="fw-600 small" style="color:var(--text-dark)" th:text="${job.title}">Title</div>
                        </td>
                        <td>
                            <div class="d-flex align-items-center gap-2">
                                <div class="company-logo" style="width:28px;height:28px;font-size:.7rem"
                                     th:text="${#strings.substring(job.employer.fullName,0,1).toUpperCase()}">E</div>
                                <span class="small" th:text="${job.employer.fullName}">Employer</span>
                            </div>
                        </td>
                        <td><span class="small text-muted" th:text="${job.category ?: '—'}"></span></td>
                        <td><span class="small text-muted" th:text="${job.location ?: '—'}"></span></td>
                        <td>
                            <span class="small text-muted"
                                  th:text="${job.createdAt != null ? #temporals.format(job.createdAt,'MMM d, yyyy') : '—'}"></span>
                        </td>
                        <td>
                            <span th:switch="${job.status?.name()}">
                                <span th:case="'APPROVED'" class="badge-type badge-hired">Approved</span>
                                <span th:case="'REJECTED'" class="badge-type badge-rejected">Rejected</span>
                                <span th:case="*"          class="badge-type badge-interview"
                                      style="background:#FFF4E5;color:#C96A00">Pending</span>
                            </span>
                        </td>
                        <td>
                            <div class="d-flex gap-1">
                                <form method="post" th:action="@{/admin/jobs/{id}/approve(id=${job.jobId})}">
                                    <button class="btn btn-sm rounded-8"
                                            style="background:#E8F6EC;color:#0BA02C;border:none;font-size:.75rem;padding:4px 10px"
                                            th:disabled="${job.status?.name() == 'APPROVED'}"
                                            title="Approve">
                                        <i class="bi bi-check-lg me-1"></i>Approve
                                    </button>
                                </form>
                                <form method="post" th:action="@{/admin/jobs/{id}/reject(id=${job.jobId})}">
                                    <button class="btn btn-sm rounded-8"
                                            style="background:#FFEAEA;color:#E05151;border:none;font-size:.75rem;padding:4px 10px"
                                            th:disabled="${job.status?.name() == 'REJECTED'}"
                                            title="Reject">
                                        <i class="bi bi-x-lg me-1"></i>Reject
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>

                    <!-- shown by JS when filter returns zero results -->
                    <tr id="noResultsRow" style="display:none">
                        <td colspan="8" class="text-center text-muted py-5">
                            <i class="bi bi-search me-2"></i>No jobs match the current filter.
                        </td>
                    </tr>

                    <tr th:if="${#lists.isEmpty(jobs)}">
                        <td colspan="8" class="text-center text-muted py-5">No jobs found.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<style>
.filter-chip {
    border: none;
    border-radius: 20px;
    padding: 4px 14px;
    font-size: .8rem;
    font-weight: 500;
    cursor: pointer;
    transition: opacity .15s;
}
.filter-chip:hover { opacity: .85; }
</style>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
const CHIP_DEFAULTS = {
    'ALL':      { bg: 'var(--dark)',  color: '#fff'     },
    'PENDING':  { bg: '#FFF4E5',      color: '#C96A00'  },
    'APPROVED': { bg: '#E8F6EC',      color: '#0BA02C'  },
    'REJECTED': { bg: '#FFEAEA',      color: '#E05151'  }
};

let currentFilter = 'ALL';

function filterJobs(status) {
    currentFilter = status;

    Object.entries(CHIP_DEFAULTS).forEach(([key, def]) => {
        const btn = document.getElementById('fb-' + key);
        if (!btn) return;
        const active = key === status;
        btn.style.background  = active ? 'var(--primary)' : def.bg;
        btn.style.color       = active ? '#fff'           : def.color;
        btn.style.fontWeight  = active ? '700'            : '500';
    });

    applyFilterSort();
}

function applyFilterSort() {
    const tbody  = document.getElementById('jobsTbody');
    const rows   = Array.from(tbody.querySelectorAll('tr.job-row'));
    const sort   = document.getElementById('sortSelect').value;

    // Sort all rows in-place
    rows.sort((a, b) => {
        switch (sort) {
            case 'date-desc':  return (b.dataset.created || '').localeCompare(a.dataset.created || '');
            case 'date-asc':   return (a.dataset.created || '').localeCompare(b.dataset.created || '');
            case 'alpha-asc':  return (a.dataset.title   || '').localeCompare(b.dataset.title   || '');
            case 'alpha-desc': return (b.dataset.title   || '').localeCompare(a.dataset.title   || '');
            default: return 0;
        }
    });

    let visible = 0;
    rows.forEach(row => {
        const show = currentFilter === 'ALL' || row.dataset.status === currentFilter;
        row.style.display = show ? '' : 'none';
        tbody.appendChild(row);   // re-insert in sorted order
        if (show) visible++;
    });

    const noResults = document.getElementById('noResultsRow');
    if (noResults) noResults.style.display = visible === 0 ? '' : 'none';

    const countEl = document.getElementById('jobCount');
    if (countEl) countEl.textContent = visible;
}
</script>
</body>
</html>
