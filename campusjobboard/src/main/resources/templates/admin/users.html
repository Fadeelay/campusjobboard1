<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Manage Users')}"></head>
<body>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="page-header">
    <div class="container d-flex justify-content-between align-items-center flex-wrap gap-3">
        <div>
            <h1><i class="bi bi-people me-2"></i>Manage Users</h1>
            <p class="mb-0">Activate or deactivate user accounts</p>
        </div>
        <a th:href="@{/admin/dashboard}" class="btn btn-outline-light rounded-12 btn-sm px-3">
            <i class="bi bi-arrow-left me-1"></i>Dashboard
        </a>
    </div>
</div>

<div class="container py-5">
    <div th:if="${success}" class="alert alert-success mb-4"><i class="bi bi-check-circle me-2"></i><span th:text="${success}"></span></div>

    <div class="data-table" data-aos="fade-up">
        <div class="table-responsive">
            <table class="table align-middle mb-0">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>User</th>
                        <th>Email</th>
                        <th>Role</th>
                        <th>Account Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="user : ${users}">
                        <td class="text-muted small" th:text="${user.userId}">1</td>
                        <td>
                            <div class="d-flex align-items-center gap-2">
                                <div class="company-logo" style="width:32px;height:32px;font-size:.8rem"
                                     th:text="${#strings.substring(user.fullName,0,1).toUpperCase()}">U</div>
                                <span class="fw-600 small" style="color:var(--text-dark)" th:text="${user.fullName}">Name</span>
                            </div>
                        </td>
                        <td><span class="small text-muted" th:text="${user.email}">email</span></td>
                        <td>
                            <span th:switch="${user.role?.name()}">
                                <span th:case="'ADMIN'"    class="badge-type" style="background:#1B2032;color:#fff;font-size:.72rem;padding:3px 10px;border-radius:20px">Admin</span>
                                <span th:case="'EMPLOYER'" class="badge-type badge-interview">Employer</span>
                                <span th:case="*"          class="badge-type badge-fulltime">Student</span>
                            </span>
                        </td>
                        <td>
                            <span th:if="${user.status?.name() == 'ACTIVE'}"   class="badge-type badge-hired">Active</span>
                            <span th:unless="${user.status?.name() == 'ACTIVE'}" class="badge-type badge-rejected">Inactive</span>
                        </td>
                        <td>
                            <div class="d-flex gap-1">
                                <form method="post" th:action="@{/admin/users/{id}/activate(id=${user.userId})}">
                                    <button class="btn btn-sm rounded-8"
                                            style="background:#E8F6EC;color:#0BA02C;border:none;font-size:.75rem;padding:4px 10px"
                                            th:disabled="${user.status?.name() == 'ACTIVE'}"
                                            title="Activate">
                                        <i class="bi bi-person-check me-1"></i>Activate
                                    </button>
                                </form>
                                <form method="post" th:action="@{/admin/users/{id}/deactivate(id=${user.userId})}">
                                    <button class="btn btn-sm rounded-8"
                                            style="background:#FFEAEA;color:#E05151;border:none;font-size:.75rem;padding:4px 10px"
                                            th:disabled="${user.status?.name() == 'INACTIVE'}"
                                            title="Deactivate">
                                        <i class="bi bi-person-x me-1"></i>Deactivate
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(users)}">
                        <td colspan="6" class="text-center text-muted py-5">No users found.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
