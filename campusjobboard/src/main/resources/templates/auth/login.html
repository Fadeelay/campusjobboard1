<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Sign In')}"></head>
<body>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="auth-wrapper">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="auth-card mx-auto">
                    <div class="text-center mb-4">
                        <div style="width:56px;height:56px;background:#E8F1FF;border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px">
                            <i class="bi bi-person-lock" style="font-size:1.6rem;color:#1967D2"></i>
                        </div>
                        <h2>Welcome back</h2>
                        <p class="subtitle mb-0">Sign in to your StudentHustle account</p>
                    </div>

                    <div th:if="${param.logout}" class="alert alert-info mb-3">
                        <i class="bi bi-check-circle me-2"></i>You've been signed out successfully.
                    </div>
                    <div th:if="${param.registered}" class="alert alert-success mb-3">
                        <i class="bi bi-check-circle me-2"></i>Account created! Please sign in.
                    </div>
                    <div th:if="${param.error}" class="alert alert-danger mb-3">
                        <i class="bi bi-exclamation-circle me-2"></i>Invalid email or password. Please try again.
                    </div>

                    <form method="post" th:action="@{/login}">
                        <div class="mb-3">
                            <label class="form-label">Email address</label>
                            <div class="input-group">
                                <span class="input-group-text bg-white border-end-0" style="border:1.5px solid var(--border);border-right:0;border-radius:8px 0 0 8px">
                                    <i class="bi bi-envelope text-muted"></i>
                                </span>
                                <input type="email" name="username" class="form-control border-start-0"
                                       style="border-radius:0 8px 8px 0"
                                       placeholder="you@university.edu" required autofocus>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-white border-end-0" style="border:1.5px solid var(--border);border-right:0;border-radius:8px 0 0 8px">
                                    <i class="bi bi-lock text-muted"></i>
                                </span>
                                <input type="password" name="password" id="pwd" class="form-control border-start-0"
                                       style="border-radius:0 8px 8px 0" placeholder="Enter your password" required>
                                <button type="button" class="btn btn-link position-absolute end-0 top-50 translate-middle-y pe-3 border-0"
                                        style="z-index:5" onclick="togglePwd()">
                                    <i class="bi bi-eye text-muted" id="eyeIcon"></i>
                                </button>
                            </div>
                        </div>
                        <button type="submit" class="btn-primary-custom">Sign In</button>
                    </form>

                    <div class="text-center mt-4 pt-3 border-top">
                        <span class="text-muted small">Don't have an account? </span>
                        <a th:href="@{/register}" style="color:var(--primary);font-weight:600;font-size:.88rem">Create one free</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
function togglePwd() {
    const p = document.getElementById('pwd');
    const i = document.getElementById('eyeIcon');
    if (p.type === 'password') { p.type = 'text';     i.className = 'bi bi-eye-slash text-muted'; }
    else                       { p.type = 'password'; i.className = 'bi bi-eye text-muted'; }
}
</script>
</body>
</html>
