<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Applicants')}"></head>
<body>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="page-header">
    <div class="container">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb mb-2" style="background:transparent;padding:0">
                <li class="breadcrumb-item"><a th:href="@{/employer/dashboard}" style="color:rgba(255,255,255,.6)">Dashboard</a></li>
                <li class="breadcrumb-item active" style="color:rgba(255,255,255,.9)">Applicants</li>
            </ol>
        </nav>
        <h1><i class="bi bi-people me-2"></i>Applicants</h1>
        <p th:text="${job.title} + ' — ' + ${#lists.size(applications)} + ' application(s)'">Job title</p>
    </div>
</div>

<div class="container py-5">
    <div th:if="${success}" class="alert alert-success mb-4"><i class="bi bi-check-circle me-2"></i><span th:text="${success}"></span></div>

    <!-- Empty state -->
    <div th:if="${#lists.isEmpty(applications)}"
         class="text-center py-5"
         style="background:#fff;border-radius:16px;border:1px solid var(--border)">
        <div style="width:72px;height:72px;background:#E8F1FF;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px">
            <i class="bi bi-people" style="font-size:1.8rem;color:var(--primary)"></i>
        </div>
        <h5 style="color:var(--text-dark)">No applications yet</h5>
        <p class="text-muted small mb-4">Students will appear here once they start applying to this role.</p>
        <a th:href="@{/employer/dashboard}" class="btn btn-outline-secondary rounded-12 px-4">Back to Dashboard</a>
    </div>

    <!-- Applications table -->
    <div th:unless="${#lists.isEmpty(applications)}" class="data-table" data-aos="fade-up">
        <div class="table-responsive">
            <table class="table align-middle mb-0">
                <thead>
                    <tr>
                        <th>Student</th>
                        <th>Student ID</th>
                        <th>Email</th>
                        <th>Applied On</th>
                        <th>Current Status</th>
                        <th>Update Status</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="app : ${applications}">
                        <td>
                            <div class="d-flex align-items-center gap-2">
                                <div class="company-logo" style="width:36px;height:36px;font-size:.85rem;background:linear-gradient(135deg,#1967D2,#1558B0)"
                                     th:text="${#strings.substring(app.student.fullName,0,1).toUpperCase()}">S</div>
                                <span class="fw-600 small" style="color:var(--text-dark)" th:text="${app.student.fullName}">Name</span>
                            </div>
                        </td>
                        <td><span class="small" style="font-family:monospace;color:var(--text-dark)" th:text="${app.studentIdNumber ?: '—'}"></span></td>
                        <td><span class="small text-muted" th:text="${app.student.email}">email</span></td>
                        <td>
                            <span class="small text-muted"
                                  th:text="${app.appliedAt != null ? #temporals.format(app.appliedAt,'MMM d, yyyy') : '—'}"></span>
                        </td>
                        <td>
                            <span th:switch="${app.status?.name()}">
                                <span th:case="'APPLIED'"      class="badge-type badge-fulltime">Applied</span>
                                <span th:case="'INTERVIEWING'" class="badge-type badge-interview">Interviewing</span>
                                <span th:case="'HIRED'"        class="badge-type badge-hired">Hired</span>
                                <span th:case="'REJECTED'"     class="badge-type badge-rejected">Rejected</span>
                                <span th:case="*"              class="badge-type badge-fulltime" th:text="${app.status}">Status</span>
                            </span>
                        </td>
                        <td>
                            <form method="post"
                                  th:action="@{/employer/applications/{id}/status(id=${app.applicationId})}">
                                <input type="hidden" name="jobId" th:value="${job.jobId}">
                                <div class="d-flex gap-2">
                                    <select name="status" class="form-select form-select-sm rounded-8"
                                            style="width:auto;font-size:.8rem">
                                        <option th:each="s : ${statuses}"
                                                th:value="${s}" th:text="${s}"
                                                th:selected="${s == app.status}">Status</option>
                                    </select>
                                    <button type="submit" class="btn btn-sm rounded-8"
                                            style="background:var(--primary);color:#fff;border:none;padding:4px 12px">
                                        <i class="bi bi-check-lg"></i>
                                    </button>
                                </div>
                            </form>
                        </td>
                        <td>
                            <a th:href="@{/employer/applications/{jobId}/detail/{appId}(jobId=${job.jobId},appId=${app.applicationId})}"
                               class="btn btn-sm rounded-8"
                               style="background:#E8F1FF;color:#1967D2;border:none;padding:4px 12px;white-space:nowrap">
                                <i class="bi bi-eye me-1"></i>View
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
