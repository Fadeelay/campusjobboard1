<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Employer Dashboard')}"></head>
<body>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="page-header">
    <div class="container d-flex justify-content-between align-items-center flex-wrap gap-3">
        <div>
            <h1><i class="bi bi-speedometer2 me-2"></i>Employer Dashboard</h1>
            <p class="mb-0">Manage your job postings and review applicants</p>
        </div>
        <a th:href="@{/employer/post-job}"
           class="btn-apply text-white text-decoration-none px-4 py-2 fw-700">
            <i class="bi bi-plus-lg me-1"></i>Post a Job
        </a>
    </div>
</div>

<div class="container py-5">
    <div th:if="${success}" class="alert alert-success mb-4"><i class="bi bi-check-circle me-2"></i><span th:text="${success}"></span></div>
    <div th:if="${error}"   class="alert alert-danger  mb-4"><i class="bi bi-exclamation-circle me-2"></i><span th:text="${error}"></span></div>

    <!-- Empty state -->
    <div th:if="${#lists.isEmpty(jobs)}"
         class="text-center py-5"
         style="background:#fff;border-radius:16px;border:1px solid var(--border)">
        <div style="width:72px;height:72px;background:#E8F1FF;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px">
            <i class="bi bi-briefcase" style="font-size:1.8rem;color:var(--primary)"></i>
        </div>
        <h5 style="color:var(--text-dark)">No job postings yet</h5>
        <p class="text-muted small mb-4">Create your first listing and start receiving applications from students.</p>
        <a th:href="@{/employer/post-job}" class="btn-apply text-white text-decoration-none px-4 py-2">
            <i class="bi bi-plus-lg me-1"></i>Post Your First Job
        </a>
    </div>

    <!-- Jobs table -->
    <div th:unless="${#lists.isEmpty(jobs)}" class="data-table" data-aos="fade-up">
        <div class="table-responsive">
            <table class="table align-middle mb-0">
                <thead>
                    <tr>
                        <th>Job Title</th>
                        <th>Category</th>
                        <th>Location</th>
                        <th>Deadline</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="job : ${jobs}">
                        <td>
                            <div class="fw-600" style="color:var(--text-dark)" th:text="${job.title}">Title</div>
                            <div class="small text-muted" th:if="${job.salary}">
                                $<span th:text="${#numbers.formatDecimal(job.salary,1,0)}"></span>/hr
                            </div>
                        </td>
                        <td><span class="small text-muted" th:text="${job.category ?: '—'}"></span></td>
                        <td><span class="small text-muted" th:text="${job.location ?: '—'}"></span></td>
                        <td><span class="small text-muted" th:text="${job.deadline ?: '—'}"></span></td>
                        <td>
                            <span th:switch="${job.status?.name()}">
                                <span th:case="'APPROVED'" class="badge-type badge-hired"><i class="bi bi-check-circle me-1"></i>Approved</span>
                                <span th:case="'REJECTED'" class="badge-type badge-rejected"><i class="bi bi-x-circle me-1"></i>Rejected</span>
                                <span th:case="*"          class="badge-type badge-interview" style="background:#FFF4E5;color:#C96A00"><i class="bi bi-hourglass-split me-1"></i>Pending</span>
                            </span>
                        </td>
                        <td>
                            <div class="d-flex gap-1 flex-wrap">
                                <a th:href="@{/employer/edit-job/{id}(id=${job.jobId})}"
                                   class="btn btn-sm btn-outline-primary rounded-8" title="Edit">
                                    <i class="bi bi-pencil me-1"></i>Edit
                                </a>
                                <a th:href="@{/employer/applications/{id}(id=${job.jobId})}"
                                   class="btn btn-sm btn-outline-secondary rounded-8" title="Applicants">
                                    <i class="bi bi-people me-1"></i>Applicants
                                </a>
                                <form method="post" th:action="@{/employer/delete-job/{id}(id=${job.jobId})}"
                                      onsubmit="return confirm('Delete this job posting?')">
                                    <button type="submit" class="btn btn-sm btn-outline-danger rounded-8" title="Delete">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
