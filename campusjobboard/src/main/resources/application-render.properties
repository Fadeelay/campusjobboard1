# Activated on Render via SPRING_PROFILES_ACTIVE=render (set in render.yaml).
# Builds the Postgres JDBC URL from the discrete host/port/database values
# Render injects from its managed database, so no manual URL copy-pasting is needed.
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.show-sql=false
