services:

  db:
    image: mysql:8.4
    container_name: campusjobs_db
    environment:
      MYSQL_DATABASE: campusjobboard_db
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpass}
      MYSQL_USER: ${DB_USERNAME:-campususer}
      MYSQL_PASSWORD: ${DB_PASSWORD:-campuspass}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: campusjobs_app
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:mysql://db:3306/campusjobboard_db
      DB_USERNAME: ${DB_USERNAME:-campususer}
      DB_PASSWORD: ${DB_PASSWORD:-campuspass}
      LOG_PATH: /app/logs
    ports:
      - "8080:8080"
    volumes:
      - app_logs:/app/logs

volumes:
  mysql_data:
  app_logs:
