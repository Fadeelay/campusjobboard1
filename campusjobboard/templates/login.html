<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head}"></head>
<body>
<div th:replace="~{fragments/header :: navigation}"></div>

<div class="auth-container">
    <div class="auth-card">
        <h1>Sign In</h1>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="username" required />
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required />
            </div>
            <button type="submit" class="btn" style="width: 100%;">Sign In</button>
        </form>

        <div th:if="${param.error}" class="error" style="margin-top: 1rem; text-align: center;">
            <p>Invalid email or password.</p>
        </div>

        <div th:if="${param.logout}" style="margin-top: 1rem; text-align: center; color: #28a745;">
            <p>You have been logged out successfully.</p>
        </div>

        <p style="text-align: center; margin-top: 2rem;">
            Don't have an account? <a th:href="@{/register}" style="color: #00b4d8;">Register here</a>
        </p>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
