<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head}"></head>
<body>
<div th:replace="~{fragments/header :: navigation}"></div>

<div class="container">
    <h1 style="margin-bottom: 2rem;">Available Jobs</h1>

    <div class="job-grid" th:if="${jobs != null and !jobs.isEmpty()}">
        <div class="job-card" th:each="job : ${jobs}">
            <h3 th:text="${job.title}">Job Title</h3>
            <div class="job-meta">
                <span>📍 <span th:text="${job.location}">Location</span></span>
                <span>💼 <span th:text="${job.category}">Category</span></span>
            </div>
            <p th:text="${#strings.abbreviate(job.description, 100)}">Description...</p>
            <div style="margin-top: 1rem;">
                <span style="color: #00b4d8; font-weight: bold;" th:text="${job.salary != null ? '$' + job.salary : 'Salary Not Specified'}"></span>
            </div>
            <a th:href="@{/student/jobs/{id}(id=${job.jobId})}" class="btn" style="margin-top: 1rem; width: 100%; text-align: center;">View Details</a>
        </div>
    </div>

    <p th:if="${jobs == null or jobs.isEmpty()}" style="text-align: center; padding: 3rem; color: #777;">
        No approved jobs available at the moment.
    </p>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
