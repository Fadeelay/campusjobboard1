<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head}"></head>
<body>
<div th:replace="~{fragments/header :: navigation}"></div>

<div class="container">
    <h1 style="margin-bottom: 1.5rem;">My Applications</h1>

    <table th:if="${applications != null and !applications.isEmpty()}">
        <thead>
        <tr>
            <th>Job Title</th>
            <th>Employer</th>
            <th>Applied On</th>
            <th>Status</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="app : ${applications}">
            <td th:text="${app.job.title}">Job Title</td>
            <td th:text="${app.job.employer.fullName}">Employer</td>
            <td th:text="${#temporals.format(app.appliedAt, 'yyyy-MM-dd HH:mm')}">Date</td>
            <td>
                    <span th:text="${app.status}"
                          th:classappend="${app.status.name() == 'SUBMITTED'} ? 'badge badge-info' :
                                          (${app.status.name() == 'ACCEPTED'} ? 'badge badge-success' :
                                                                                'badge badge-danger')">
                    </span>
            </td>
        </tr>
        </tbody>
    </table>

    <p th:if="${applications == null or applications.isEmpty()}"
       style="text-align: center; padding: 3rem; color: #777;">
        You have not applied to any jobs yet.
    </p>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
