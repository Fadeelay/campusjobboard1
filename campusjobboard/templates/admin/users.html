<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head  th:replace="~{fragments/header :: head}"></head>
<body>
<div th:replace="~{fragments/header :: navigation}"></div>

<div class="container">
    <h1>Manage Users</h1>

    <table th:if="${users != null and !users.isEmpty()}">
        <thead>
        <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Role</th>
            <th>Status</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="user : ${users}">
            <td th:text="${user.fullName}">Name</td>
            <td th:text="${user.email}">Email</td>
            <td th:text="${user.role}">Role</td>
            <td th:text="${user.status}">Status</td>
            <td>
                <form th:if="${user.status.name() == 'ACTIVE'}"
                      th:action="@{/admin/users/{id}/deactivate(id=${user.userId})}"
                      method="post" style="display:inline;">
                    <button type="submit" class="btn btn-danger">Deactivate</button>
                </form>
                <form th:if="${user.status.name() == 'INACTIVE'}"
                      th:action="@{/admin/users/{id}/activate(id=${user.userId})}"
                      method="post" style="display:inline;">
                    <button type="submit" class="btn btn-success">Activate</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

    <p th:if="${users == null or users.isEmpty()}">No users found.</p>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
