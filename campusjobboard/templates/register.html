<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head}"></head>
<body>
<div th:replace="~{fragments/header :: navigation}"></div>

<div class="auth-container">
    <div class="auth-card">
        <h1>Create Account</h1>

        <form th:action="@{/register}" th:object="${user}" method="post">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" th:field="*{fullName}" required />
                <span th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}" class="error"></span>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" th:field="*{email}" required />
                <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="error"></span>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" th:field="*{password}" required />
                <span th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="error"></span>
            </div>

            <div class="form-group">
                <label>Register As</label>
                <select th:field="*{role}" required>
                    <option value="">-- Select Role --</option>
                    <option value="STUDENT">Student</option>
                    <option value="EMPLOYER">Employer</option>
                </select>
                <span th:if="${#fields.hasErrors('role')}" th:errors="*{role}" class="error"></span>
            </div>

            <button type="submit" class="btn" style="width: 100%; margin-top: 1rem;">Register</button>
        </form>

        <p style="text-align: center; margin-top: 2rem;">
            Already have an account? <a th:href="@{/login}" style="color: #00b4d8; text-decoration: none;">Sign in here</a>
        </p>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
