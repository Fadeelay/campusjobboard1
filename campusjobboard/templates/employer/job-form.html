<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head}"></head>
<body>
<div th:replace="~{fragments/header :: navigation}"></div>

<div class="container">
    <div class="card" style="max-width: 700px; margin: 0 auto;">
        <h1 th:text="${job.jobId != null ? 'Edit Job' : 'Post a New Job'}">Post a New Job</h1>
        <p style="color: #777; margin-bottom: 1.5rem;">
            Provide clear details so students can easily understand the role.
        </p>

        <form th:action="${job.jobId != null ? '/employer/jobs/' + job.jobId + '/edit' : '/employer/jobs/new'}"
              th:object="${job}" method="post">

            <div class="form-group">
                <label>Job Title</label>
                <input type="text" th:field="*{title}"  required />
                <span th:if="${#fields.hasErrors('title')}" th:errors="*{title}" class="error"></span>
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea th:field="*{description}" rows="6"
                          placeholder="Describe responsibilities, required skills, and working hours."
                          required></textarea>
                <span th:if="${#fields.hasErrors('description')}" th:errors="*{description}" class="error"></span>
            </div>

            <div class="form-group">
                <label>Location</label>
                <input type="text" th:field="*{location}" placeholder="e.g. Main Campus, Building A" />
            </div>

            <div class="form-group">
                <label>Salary</label>
                <input type="number" step="0.01" th:field="*{salary}"  />
            </div>

            <div class="form-group">
                <label>Category</label>
                <input type="text" th:field="*{category}"  />
            </div>

            <div class="form-group">
                <label>Application Deadline</label>
                <input type="date" th:field="*{deadline}" />
            </div>

            <div style="display: flex; gap: 1rem; margin-top: 1.5rem;">
                <button type="submit" class="btn btn-success">
                    <span th:text="${job.jobId != null ? 'Update Job' : 'Post Job'}">Post Job</span>
                </button>
                <a th:href="@{/employer/my-jobs}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
